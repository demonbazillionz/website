<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>offline — demonbazillionz</title>
  <meta name="theme-color" content="#000000">
  <style>
    :root {
      --red: #ff2244;
      --green: #39ff85;
      --mono: 'Share Tech Mono', 'Courier New', monospace;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    html,body {
      height:100%; background:#000; color:#c8ffd4;
      font-family: var(--mono); display:flex;
      align-items:center; justify-content:center;
      overflow:hidden;
    }
    canvas { position:fixed; inset:0; z-index:0; opacity:0.08; }
    .box {
      position:relative; z-index:10;
      border:1px solid rgba(255,34,68,0.3);
      padding:40px 50px; text-align:center;
      background:rgba(4,0,1,0.97);
      box-shadow: 0 0 60px rgba(139,0,0,0.15);
      max-width:480px; width:90%;
    }
    .code {
      font-size:clamp(3rem,10vw,5rem);
      color:var(--red);
      text-shadow:0 0 30px rgba(255,34,68,0.5);
      letter-spacing:6px;
      animation:flicker 3s ease-in-out infinite;
    }
    @keyframes flicker {
      0%,92%,100%{ opacity:1; }
      93%{ opacity:0.2; }
      96%{ opacity:0.8; }
    }
    .title { font-size:0.9rem; color:rgba(255,100,120,0.7); letter-spacing:3px; margin:12px 0 20px; }
    .msg { font-size:0.75rem; color:#7de89a; letter-spacing:1.5px; line-height:2; margin-bottom:24px; }
    .retry-btn {
      display:inline-block; padding:10px 28px;
      border:1px solid rgba(57,255,133,0.4); color:var(--green);
      font-family:var(--mono); font-size:0.72rem; letter-spacing:2px;
      text-transform:uppercase; cursor:pointer; background:transparent;
      transition:all 0.2s;
    }
    .retry-btn:hover { background:rgba(57,255,133,0.07); box-shadow:0 0 14px rgba(57,255,133,0.15); }
    .dot { display:inline-block; animation:blink 1.2s step-start infinite; }
    @keyframes blink { 50%{opacity:0} }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
</head>
<body>
<canvas id="c"></canvas>
<div class="box">
  <div class="code">ERR_0x0</div>
  <div class="title">// connection severed</div>
  <div class="msg">
    daemon signal lost<br>
    you are in the void<br>
    network: <span style="color:var(--red)">unreachable</span><span class="dot">_</span>
  </div>
  <button class="retry-btn" onclick="location.reload()">↺ reconnect</button>
</div>
<script>
  // Mini matrix for offline page
  const c = document.getElementById('c');
  const ctx = c.getContext('2d');
  c.width = window.innerWidth; c.height = window.innerHeight;
  const cols = Math.floor(c.width / 20);
  const drops = Array(cols).fill(1);
  setInterval(() => {
    ctx.fillStyle = 'rgba(0,0,0,0.05)';
    ctx.fillRect(0,0,c.width,c.height);
    ctx.fillStyle = '#39ff85';
    ctx.font = '14px monospace';
    drops.forEach((y,i) => {
      ctx.fillText(String.fromCharCode(0x30A0 + Math.random()*96), i*20, y*20);
      if(y*20 > c.height && Math.random() > 0.975) drops[i] = 0;
      drops[i]++;
    });
  }, 50);
</script>
</body>
</html>
